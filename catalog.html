  <meta name="description" content="AslToshMebel — Полный каталог декоративного камня. 182 декора кварцевого и акрилового камня." />
  <title>Каталог — Asl Tosh Mebellari</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/styles/main.css" />
  <script>
    (function(){
      var k='aslToshVisitors';
      try{var d=new Date(),t=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');var v=JSON.parse(localStorage.getItem(k)||'{}');v[t]=(v[t]||0)+1;localStorage.setItem(k,JSON.stringify(v));}catch(e){}
      try{fetch('/sb/increment-visitor',{method:'POST'}).catch(function(){});}catch(e){}
    })()
  </script>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar scrolled" id="navbar">
    <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3 text-decoration-none">
        <img src="/logo.svg" alt="Asl Tosh Mebellari" class="navbar-logo" />
      </a>

      <div class="hidden md:flex items-center gap-10">
        <a href="/" class="nav-link" data-ru="Главная" data-uz="Bosh sahifa">Главная</a>
        <a href="/#about" class="nav-link" data-ru="О нас" data-uz="Biz haqimizda">О нас</a>
        <a href="/catalog.html" class="nav-link nav-highlight active" data-ru="Каталог" data-uz="Katalog"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Каталог</a>
        <a href="/#process" class="nav-link" data-ru="Процесс" data-uz="Jarayon">Процесс</a>
        <a href="/#contact" class="nav-link" data-ru="Контакты" data-uz="Aloqa">Контакты</a>
        <a href="/3d-kitchen.html" class="nav-link nav-highlight" data-ru="3D Кухня" data-uz="3D Oshxona"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg> 3D Кухня</a>
      </div>

      <div class="hidden md:flex items-center gap-3">
        <button id="themeToggle" class="theme-toggle" title="Light/Dark mode" aria-label="Toggle theme">
          <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="langToggle" class="px-3 py-1.5 text-xs font-semibold tracking-wider uppercase border border-[#c8a45c]/40 text-[#c8a45c] hover:bg-[#c8a45c] hover:text-[#0a0a0a] transition-all duration-300">UZ</button>
        <a href="/#contact" class="btn-primary text-sm py-3 px-6" data-ru="Заказать" data-uz="Buyurtma berish">Заказать</a>
      </div>

      <div class="flex md:hidden items-center gap-2">
        <a href="/3d-kitchen.html" class="mobile-3d-btn" data-ru="3D Кухня" data-uz="3D Oshxona">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          3D Кухня
        </a>
        <button id="themeToggleMobile" class="theme-toggle" title="Light/Dark mode" aria-label="Toggle theme">
          <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="langToggleMobile" class="px-3 py-1.5 text-xs font-semibold tracking-wider uppercase border border-[#c8a45c]/40 text-[#c8a45c] hover:bg-[#c8a45c] hover:text-[#0a0a0a] transition-all duration-300">UZ</button>
        <button class="hamburger" id="hamburger" aria-label="Menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="/" class="nav-link mobile-nav-link" data-ru="Главная" data-uz="Bosh sahifa">Главная</a>
    <a href="/#about" class="nav-link mobile-nav-link" data-ru="О нас" data-uz="Biz haqimizda">О нас</a>
    <a href="/catalog.html" class="nav-link mobile-nav-link" data-ru="Каталог" data-uz="Katalog">Каталог</a>
    <a href="/#process" class="nav-link mobile-nav-link" data-ru="Процесс" data-uz="Jarayon">Процесс</a>
    <a href="/#contact" class="nav-link mobile-nav-link" data-ru="Контакты" data-uz="Aloqa">Контакты</a>
    <a href="/#contact" class="btn-primary mt-4" data-ru="Заказать" data-uz="Buyurtma berish">Заказать</a>
  </div>

  <!-- CATALOG PAGE -->
  <section class="pb-24 min-h-screen" style="padding-top: 120px;" id="catalogPage">
    <div class="max-w-7xl mx-auto px-6">
      <!-- Header -->
      <div class="text-center mb-8">
        <div class="section-label justify-center">
          <span></span><span data-ru="Полный каталог" data-uz="To'liq katalog">Полный каталог</span>
        </div>
      </div>

      <!-- Search -->
      <div class="max-w-xl mx-auto mb-8 relative">
        <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-[#5a5a5a]" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Поиск по названию..." />
      </div>

      <!-- Type Filters (main) -->
      <div class="flex flex-wrap justify-center gap-3 mb-4" id="typeFilters">
        <button class="filter-btn active" data-type="all" data-ru="Все" data-uz="Barchasi">Все</button>
        <button class="filter-btn" data-type="akril" data-ru="Акрил" data-uz="Akril">Акрил</button>
        <button class="filter-btn" data-type="kvars" data-ru="Кварц" data-uz="Kvarts">Кварц</button>
        <button class="filter-btn" data-type="granit" data-ru="Жидкий гранит" data-uz="Suyuq granit">Жидкий гранит</button>
      </div>

      <!-- Sub-category Filters (dynamic) -->
      <div class="flex flex-wrap justify-center gap-2 mb-12 hidden" id="subFilters"></div>

      <!-- Results count -->
      <div class="text-center mb-8">
        <p class="text-[#8a8578] text-sm" id="resultsCount"></p>
      </div>

      <!-- Stone Grid -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6" id="stoneGrid">
        <!-- Cards injected by JS -->
      </div>

      <!-- No Results -->
      <div class="text-center py-20 hidden" id="noResults">
        <svg class="mx-auto mb-4 text-[#3a3a3a]" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <h3 class="font-heading text-xl text-white mb-2" data-ru="Ничего не найдено" data-uz="Hech narsa topilmadi">Ничего не найдено</h3>
        <p class="text-[#8a8578]" data-ru="Попробуйте изменить запрос" data-uz="Qidiruv so'rovingizni o'zgartirib ko'ring">Попробуйте изменить запрос</p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer py-12">
    <div class="max-w-7xl mx-auto px-6">
      <div class="border-t border-white/5 pt-8 flex flex-col md:flex-row items-center justify-between gap-4">
        <p class="text-[#5a5a5a] text-sm">&copy; 2024 AslToshMebel. Все права защищены.</p>
        <a href="/" class="btn-outline text-sm py-2 px-6" data-ru="На главную" data-uz="Bosh sahifaga">На главную</a>
      </div>
    </div>
  </footer>

  <!-- STONE DETAIL MODAL -->
  <div class="modal-overlay" id="stoneModal">
    <div class="modal-content relative">
      <button class="modal-close" id="modalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- ORDER FORM MODAL -->
  <div class="order-form-overlay" id="orderModal">
    <div class="modal-content relative max-w-lg">
      <button class="modal-close" id="orderModalClose">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="p-8 md:p-10">
        <h3 class="font-heading text-2xl font-semibold text-white mb-2" data-ru="Оформить заказ" data-uz="Buyurtma berish">Оформить заказ</h3>
        <p class="text-[#8a8578] text-sm mb-6" id="orderStoneName">Выбранный камень: —</p>
        <form id="orderForm" class="space-y-5">
          <input type="hidden" name="stoneId" id="orderStoneId" />
          <div>
            <label class="block text-[#8a8578] text-xs font-medium tracking-wider uppercase mb-2" data-ru="Ваше имя *" data-uz="Ismingiz *">Ваше имя *</label>
            <input type="text" name="name" class="form-input" placeholder="Ваше имя" required />
          </div>
          <div>
            <label class="block text-[#8a8578] text-xs font-medium tracking-wider uppercase mb-2" data-ru="Телефон *" data-uz="Telefon *">Телефон *</label>
            <input type="tel" name="phone" class="form-input" placeholder="+998 90 123 45 67" required />
          </div>
          <div>
            <label class="block text-[#8a8578] text-xs font-medium tracking-wider uppercase mb-2" data-ru="Тип камня" data-uz="Tosh turi">Тип камня</label>
            <select name="orderStoneType" id="orderStoneType" class="form-input bg-[rgba(26,26,26,0.8)]">
              <option value="">Выберите тип...</option>
            </select>
          </div>
          <div>
            <label class="block text-[#8a8578] text-xs font-medium tracking-wider uppercase mb-2" data-ru="Декор" data-uz="Dekor">Декор</label>
            <select name="orderDecor" id="orderDecor" class="form-input bg-[rgba(26,26,26,0.8)]">
              <option value="">Сначала выберите тип...</option>
            </select>
          </div>
          <div>
            <label class="block text-[#8a8578] text-xs font-medium tracking-wider uppercase mb-2" data-ru="Сообщение" data-uz="Xabar">Сообщение</label>
            <textarea name="message" class="form-input form-textarea" placeholder="Дополнительная информация..." rows="3"></textarea>
          </div>
          <button type="submit" class="btn-primary w-full justify-center">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            <span data-ru="Отправить заказ" data-uz="Buyurtma yuborish">Отправить заказ</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span id="toastMessage">Сообщение отправлено!</span>
  </div>

  <!-- BACK TO TOP -->
  <button class="back-to-top" id="backToTop" aria-label="Наверх">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script type="module" src="/src/js/catalog.js"></script>
</body>
</html>
